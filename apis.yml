aid: healthdata
name: HealthData.gov
description: >
  HealthData.gov is the U.S. Department of Health and Human Services open data
  platform providing public access to federal health datasets including Medicare
  claims, hospital quality ratings, drug utilization data, public health
  indicators, and data from agencies such as CMS, CDC, FDA, and NIH. The
  platform is powered by the Socrata Open Data API (SODA) and exposes every
  dataset through a consistent REST API using SoQL query language, enabling
  developers to build applications, conduct research, and create data
  visualizations from authoritative government health data.
