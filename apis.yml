apis:
  - name: HealthData.gov SODA API
    description: >
      The Socrata Open Data API (SODA) provides programmatic access to all
      public datasets hosted on HealthData.gov. Each dataset is accessible
      through a unique eight-character identifier inserted into the REST
      endpoint. Queries are expressed using SoQL (Socrata Query Language),
      a SQL-like syntax that supports filtering, sorting, aggregation, and
      pagination. Datasets span Medicare inpatient and outpatient claims,
      hospital compare quality scores, state drug utilization data, community
      health indicators, and thousands of additional HHS datasets. No
      authentication is required for public datasets; an app token raises the
      default request quota significantly.
